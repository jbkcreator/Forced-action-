# Browser Automation Task Prompts for Foreclosure Auctions

# Foreclosure auction calendar scraping task
auction_scrape:
  description: "Navigate to RealForeclose auction calendar and extract listing-level data only"
  task_template: |
    1. Open {preview_url}
    2. Wait for the auction calendar table to fully load.
    3. Extract the following fields directly from the calendar listing for EACH auction row (do NOT click into detail pages):
       - case_number
       - status
       - property_address
       - opening_bid
       - judgment_amount
       - case_detail_url: look for a <td> with class "AD_DTA" containing an <a> tag — extract the full href attribute value
    4. Collect all rows across all sections (Waiting, Running, Closed/Canceled) and across all pages if pagination exists.
    5. When done, call done() with a JSON string in this exact format:
       {{"auctions": [{{"case_number": "...", "status": "...", "property_address": "...", "opening_bid": "...", "judgment_amount": "...", "case_detail_url": "..."}}]}}
    6. Do NOT write any files. Return ALL data in the done() text field as JSON.

    NB: Only scrape the given URL. Do not navigate to detail pages, do not search other websites.
    Handle any captchas or anti-bot measures by waiting and retrying.
