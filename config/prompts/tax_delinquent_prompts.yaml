# Browser Automation Task Prompts for Tax Delinquent Reports

# Tax delinquent report download task
tax_delinquent_download:
  description: "Navigate to Hillsborough County tax reports and download delinquent accounts"
  task_template: |
    Go to https://county-taxes.net/hillsborough/reports/real-estate

    IMPORTANT RULES — read before acting:
    - After every click, WAIT at least 3 seconds before doing anything else.
    - Never click the same button twice in a row. If a click does not produce a result, wait 5 seconds and check the page state before trying again.
    - If a dropdown or menu is open, do NOT click outside it — click the desired option first.
    - Never reload the page.

    STEPS:
    1. Click the shared-report dropdown (labelled "Select a shared report..." or similar).
       Wait 3 seconds for the option list to appear.
       Click "Public - Delinquent Report" from the list.
       Wait 3 seconds and confirm the field now shows "Public - Delinquent Report".

    2. Locate the Account Status filter. Click it and select '{account_status}'.
       Wait 2 seconds.

    3. Locate the Tax Year field. Clear it and type '{tax_year}'.
       Wait 2 seconds.

    4. Click the Search / View Report button ONCE.
       Wait 15 seconds for the data grid to load.
       If the page still shows "Click Search to run the report" after 15 seconds, click Search ONCE more and wait another 15 seconds.
       Do NOT click Search a third time — if it still hasn't loaded, report the error.

    5. Once the data grid is visible with rows of results, find the Download or Export button/link.
       Click it and choose CSV format (Excel is acceptable if CSV is not available).
       Wait 30 seconds for the download to complete.

    6. Call done() with a message confirming the download completed, or describing the error if it failed.

# Firecrawl extraction prompt for individual parcels
parcel_extraction:
  description: "Extract structured tax delinquency data from parcel detail page"
  prompt_template: |
    The page shows tax account details for account number {account_number}.
    Look the whole page and find out the total amount due and how many years are delinquent (unpaid).
    Focus on finding the most recent and relevant information.
    There is no dedicated field for years delinquent. So you need to look at account history 
    and other available data to find the years that have unpaid taxes, then count them to determine the years delinquent.

  schema:
    type: "object"
    properties:
      total_amount_due:
        type: "string"
        description: "The total amount due in dollars (e.g., '1234.56'). Look for 'Total amount due' or 'Balance Due'."
      years_delinquent:
        type: "number"
        description: "Count of distinct years with UNPAID status in the account history"
    required:
      - "total_amount_due"
      - "years_delinquent"
