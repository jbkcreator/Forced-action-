# Browser Automation Task Prompts for Lien/Judgment Documents

# Document search task
document_search:
  description: "Navigate to Hillsborough County Clerk document search and download specific document types"
  task_template: |
    Navigate to the Hillsborough County Clerk document search and download {doc_type}:

    1. Go to {url}
    2. Wait 5 seconds for the page to fully initialize before interacting with anything
    3. On the left side, look for "Search Type" or similar section
    4. Select "Document Type" from the search type options
    5. In the search form that appears, find the document type field
    6. Select or enter "{doc_type_code}" as the document type
    7. Find the date range fields (likely labeled "Filed From" / "Filed To" or similar)
    8. Set the FROM/START date to: {start_date_str}
    9. Set the TO/END date to: {end_date_str}
    10. Click the Search button to run the search
    11. Wait for results to load - there should be a table/grid of records
    12. Scroll down if needed to see all results and find the export button
    13. If you see an error message: "Results exceeded the limit of 6000, please narrow your search criteria", Try reducing the lookback_days by 10 and re run.
    14. Look for "Export to Spreadsheet" or "Export" button
    15. Click the export button to download the data
    16. Wait at least {wait_after_download} seconds for the download to complete
    17. Close any dialogs or popups that appear

    Do not navigate away or open new tabs. If you encounter issues, describe what you see.

# Document type configurations
document_types:
  LIEN:
    code: "LIEN"
    name: "General Liens"
    option_value: "(LN) LIEN"
    lookback_days: 30
  LNCORPTX:
    code: "LNCORPTX"
    name: "Corp Tax Liens"
    option_value: "(LNCORPTX) CORP TAX LIEN FOR STATE OF FLORIDA"
    lookback_days: 30
  JUD:
    code: "JUD"
    name: "Judgments"
    option_value: "(JUD) JUDGMENT"
    lookback_days: 30
  CCJ:
    code: "CCJ"
    name: "Certified Judgments"
    option_value: "(CCJ) CERTIFIED COPY OF A COURT JUDGMENT"
    lookback_days: 30
  D:
    code: "D"
    name: "Deeds"
    option_value: "(D) DEED"
    lookback_days: 30
  TAXDEED:
    code: "TAXDEED"
    name: "Tax Deeds"
    option_value: "(TAXDEED) TAX DEED"
    lookback_days: 30
