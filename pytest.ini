[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    scenario: sandbox end-to-end scenario tests (opt-in, slow)
    scenario_cora: Cora/LangGraph scenarios (subset of scenario)
    scenario_platform: platform-flow scenarios (cron, webhooks, APIs, behavioural)
filterwarnings =
    ignore::DeprecationWarning:pydantic
    ignore::pydantic.warnings.PydanticDeprecatedSince20
